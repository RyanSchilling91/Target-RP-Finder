<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Target RP Finder{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="topbar">
        <div class="usgs-mark"><span>USGS</span></div>
        <div class="topbar-titles">
            <span class="app-title">Target RP Finder</span>
            <span class="app-sub">U.S. Geological Survey · GCMS Laboratory</span>
        </div>
        <div class="topbar-spacer"></div>
        <nav>
            <a href="/" class="nav-home">Home</a>
        </nav>
    </div>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
